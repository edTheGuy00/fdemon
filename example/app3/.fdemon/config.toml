# Flutter Demon Configuration — Example App 3
# Demonstrates multi-config auto_start: the launch.toml has auto_start = true
# on the "Staging" config, so fdemon should auto-launch that config.
# The [behavior] auto_start below is false to rely solely on per-config auto_start.

[behavior]
auto_start = false      # Global auto_start disabled — per-config takes precedence
confirm_quit = true

[watcher]
paths = ["lib"]
debounce_ms = 500
auto_reload = true
extensions = ["dart"]

[ui]
log_buffer_size = 10000
show_timestamps = true
compact_logs = false
theme = "default"
stack_trace_collapsed = true
stack_trace_max_frames = 3

[devtools]
auto_open = false
browser = ""

[editor]
command = ""
open_pattern = "$EDITOR $FILE:$LINE"

[native_logs]
enabled = false
