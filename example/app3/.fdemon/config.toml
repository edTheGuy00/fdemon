# Flutter Demon Configuration — Example App 3
# Configured for profile mode lag reproduction (Issue #25).
# Uses aggressive DevTools polling (minimum allowed intervals) to maximise VM
# Service pressure, matching the reporter's environment.
# The [behavior] auto_start is false — per-config auto_start in launch.toml
# controls which configuration launches automatically.

[behavior]
auto_start = false      # Global auto_start disabled — per-config takes precedence
confirm_quit = true

[watcher]
paths = ["lib"]
debounce_ms = 500
auto_reload = true
extensions = ["dart"]

[ui]
log_buffer_size = 10000
show_timestamps = true
compact_logs = false
theme = "default"
stack_trace_collapsed = true
stack_trace_max_frames = 3

[devtools]
auto_open = false
browser = ""
default_panel = "performance"
performance_refresh_ms = 500
memory_history_size = 60
tree_max_depth = 0
inspector_fetch_timeout_secs = 60
auto_repaint_rainbow = false
auto_performance_overlay = false
allocation_profile_interval_ms = 1000
max_network_entries = 500
network_auto_record = true
network_poll_interval_ms = 1000

[devtools.logging]
hybrid_enabled = true
prefer_vm_level = true
show_source_indicator = true
dedupe_threshold_ms = 100

[dap]
port = 33001
bind_address = "127.0.0.1"


[editor]
command = ""
open_pattern = "$EDITOR $FILE:$LINE"

[native_logs]
enabled = false
