# Flutter Demon Configuration — Example App 4
# Demonstrates watcher path edge cases (Issue #17 reproduction):
#   - "lib"             — own lib directory (relative, normal case)
#   - "../shared_lib"    — sibling shared_lib directory
#                          (cross-project path using ../ traversal)
#   - "../app1/lib"     — sibling project lib directory
#   - "../nonexistent"  — intentionally missing path to exercise warning behavior
# Also watches .json files in addition to .dart files.

[behavior]
confirm_quit = true

[watcher]
paths = ["lib", "../shared_lib", "../app1/lib", "../nonexistent"]
debounce_ms = 500
auto_reload = true
extensions = ["dart", "json"]    # Also watch .json files

[ui]
log_buffer_size = 10000
show_timestamps = true
compact_logs = false
theme = "default"
stack_trace_collapsed = true
stack_trace_max_frames = 3

[devtools]
auto_open = false
browser = ""

[editor]
command = ""
open_pattern = "$EDITOR $FILE:$LINE"

[native_logs]
enabled = false
