# Flutter Demon Configuration — Example App 2
# This file demonstrates native platform log settings and custom sources.

[behavior]
auto_start = false      # Set to true to skip device selection
confirm_quit = true     # Ask before quitting with running apps

[watcher]
paths = ["lib"]
debounce_ms = 500
auto_reload = true
extensions = ["dart"]

[ui]
log_buffer_size = 10000
show_timestamps = true
compact_logs = false
theme = "default"
stack_trace_collapsed = true
stack_trace_max_frames = 3

[devtools]
auto_open = false
browser = ""            # Empty = system default

[editor]
# Editor command (leave empty for auto-detection)
# Auto-detected from: parent IDE, $VISUAL, $EDITOR, or common editors in PATH
command = ""
# Pattern for opening file at line/column
# Variables: $EDITOR, $FILE, $LINE, $COLUMN
open_pattern = "$EDITOR $FILE:$LINE"

[native_logs]
# Master toggle for native platform log capture (default: true)
enabled = true

# Tags to exclude from native capture (default: ["flutter"])
# The "flutter" tag is excluded to avoid duplicating logs already captured via --machine
exclude_tags = ["flutter"]

# Minimum log level for native logs (default: "info")
# Options: "verbose", "debug", "info", "warning", "error"
min_level = "info"

# Per-tag level overrides — show GoLog debug messages to see gRPC details,
# but suppress OkHttp noise below warning level.
[native_logs.tags.GoLog]
min_level = "debug"

[native_logs.tags.OkHttp]
min_level = "warning"

# Custom log sources — arbitrary processes whose output is parsed as log entries.
# These run alongside the built-in platform capture (Android logcat, macOS/iOS log stream).

# Raw text log source — simulates a native sidecar (gRPC server)
[[native_logs.custom_sources]]
name = "sidecar"
command = "bash"
args = ["scripts/raw-log-source.sh"]
format = "raw"

# JSON structured log source — simulates a backend API server
[[native_logs.custom_sources]]
name = "api-server"
command = "bash"
args = ["scripts/json-log-source.sh"]
format = "json"

