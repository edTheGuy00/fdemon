name: E2E Tests

on:
  push:
    branches: [main]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      timeout:
        description: 'Test timeout in seconds'
        required: false
        default: '300'

env:
  FDEMON_TEST_TIMEOUT: ${{ github.event.inputs.timeout || '300' }}
  DOCKER_BUILDKIT: 1

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    name: Docker E2E Tests
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Cache Docker layers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile.test', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build test image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: ./Dockerfile.test
          push: false
          load: true
          tags: fdemon-test:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevents cache from growing indefinitely
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run E2E tests
        id: e2e
        run: |
          mkdir -p test-logs
          docker compose -f docker-compose.test.yml run \
            --rm \
            -e FDEMON_LOG_DIR=/app/test-logs \
            -e FDEMON_TEST_TIMEOUT=${{ env.FDEMON_TEST_TIMEOUT }} \
            flutter-e2e-test 2>&1 | tee test-logs/docker-run.log
        continue-on-error: true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-test-logs-${{ github.run_number }}
          path: test-logs/
          if-no-files-found: warn
          retention-days: 7

      - name: Check test result
        if: steps.e2e.outcome == 'failure'
        run: |
          echo "::group::Docker run output"
          cat test-logs/docker-run.log 2>/dev/null || echo "No docker-run.log found"
          echo "::endgroup::"
          echo "::error::E2E tests failed. Check the test-logs artifact for details."
          exit 1

      - name: Report success
        if: steps.e2e.outcome == 'success'
        run: echo "::notice::All E2E tests passed!"

  # Run mock tests in parallel for fast feedback
  mock-tests:
    name: Mock Daemon Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'  # Skip on nightly (run full only)

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        # NOTE: pinned to a commit SHA for supply-chain immutability (action-code is
        # frozen); the rustc version still tracks 'stable' at workflow runtime.

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install nextest
        uses: taiki-e/install-action@e537394e10461340f56469a03c3e73f1705074a9 # nextest

      - name: Run mock tests with retry
        id: mock_tests
        run: cargo nextest run --profile ci --test e2e
        env:
          CI: true
          RUST_BACKTRACE: 1
        continue-on-error: true

      - name: Check test result
        if: steps.mock_tests.outcome == 'failure'
        run: |
          echo "::error::Mock tests failed."
          exit 1

      - name: Report success
        if: steps.mock_tests.outcome == 'success'
        run: echo "::notice::All mock tests passed!"
