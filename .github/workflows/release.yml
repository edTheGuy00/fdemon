name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 0.3.0). Leave empty for auto-bump from conventional commits.'
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Step 1: Compute version and create tag ──────────────────────────
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout with full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install git-cliff
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.22
        with:
          tool: git-cliff

      - name: Compute next version
        id: compute
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
            echo "Using manual version: $TAG"
          else
            TAG=$(git cliff --bumped-version 2>/dev/null || true)
            if [ -z "$TAG" ]; then
              echo "::error::No releasable conventional commits found since last tag."
              exit 1
            fi
            LAST=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
            if [ "$TAG" = "$LAST" ]; then
              echo "::error::No version bump needed ($TAG already tagged)."
              exit 1
            fi
            VERSION="${TAG#v}"
            echo "Auto-computed version: $TAG (was $LAST)"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        # NOTE: pinned to a commit SHA for supply-chain immutability (action-code is
        # frozen); the rustc version still tracks 'stable' at workflow runtime.

      - name: Update Cargo.toml version
        run: |
          VERSION="${{ steps.compute.outputs.version }}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          grep -q "^version = \"$VERSION\"" Cargo.toml || { echo "::error::Failed to update version"; exit 1; }
          echo "Updated Cargo.toml to version $VERSION"

      - name: Update Cargo.lock
        run: cargo generate-lockfile

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): bump version to ${{ steps.compute.outputs.version }} [skip ci]"

      - name: Create and push tag
        run: |
          TAG="${{ steps.compute.outputs.tag }}"
          # Remove stale tag from a previous failed run, if any
          git tag -d "$TAG" 2>/dev/null || true
          git push origin --delete "$TAG" 2>/dev/null || true
          git tag "$TAG"
          git push origin HEAD:main "$TAG"

  # ── Step 2: Build binaries ──────────────────────────────────────────
  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: [version]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        # NOTE: pinned to a commit SHA for supply-chain immutability (action-code is
        # frozen); the rustc version still tracks 'stable' at workflow runtime.
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/fdemon

      - name: Package
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          ARCHIVE="fdemon-v${VERSION}-${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/fdemon ./fdemon
          tar czf "$ARCHIVE" fdemon
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fdemon-v${{ needs.version.outputs.version }}-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  build-linux:
    name: Build Linux (${{ matrix.target }})
    needs: [version]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        # NOTE: pinned to a commit SHA for supply-chain immutability (action-code is
        # frozen); the rustc version still tracks 'stable' at workflow runtime.
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary (x86_64 only)
        if: ${{ !matrix.use_cross }}
        run: strip target/${{ matrix.target }}/release/fdemon

      - name: Package
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          ARCHIVE="fdemon-v${VERSION}-${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/fdemon ./fdemon
          tar czf "$ARCHIVE" fdemon
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fdemon-v${{ needs.version.outputs.version }}-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  build-windows:
    name: Build Windows (x86_64)
    needs: [version]
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        # NOTE: pinned to a commit SHA for supply-chain immutability (action-code is
        # frozen); the rustc version still tracks 'stable' at workflow runtime.
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $archive = "fdemon-v${version}-x86_64-pc-windows-msvc.zip"
          Copy-Item "target\x86_64-pc-windows-msvc\release\fdemon.exe" -Destination "fdemon.exe"
          Compress-Archive -Path fdemon.exe -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fdemon-v${{ needs.version.outputs.version }}-x86_64-pc-windows-msvc
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  # ── Step 3: Create GitHub Release ───────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [version, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.version.outputs.tag }}
          fetch-depth: 0

      - name: Generate release changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: artifacts/
        run: sha256sum fdemon-v*.tar.gz fdemon-v*.zip > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          draft: false
          prerelease: false
          body_path: CHANGES.md
          files: |
            artifacts/fdemon-v*.tar.gz
            artifacts/fdemon-v*.zip
            artifacts/checksums-sha256.txt

  # ── Step 4: Deploy Website ──────────────────────────────────────────
  publish-site:
    name: Publish Website
    needs: [version, release]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: edtheguy00/flutter-demon-site

    steps:
      - name: Checkout with full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.version.outputs.tag }}
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.22
        with:
          tool: git-cliff

      - name: Generate changelog JSON for website
        run: git cliff --context -o website/changelog.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./website
          file: ./website/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
